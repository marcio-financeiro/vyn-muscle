<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vyn Muscle — Coach</title>
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/app.css">
</head>
<body class="papel-log page">

  <header class="topbar">
    <div class="marca">
      <span class="marca-vyn">VYN</span>
      <span class="marca-muscle">MUSCLE</span>
    </div>
    <button class="btn-sair" id="btn-sair">Sair</button>
  </header>

  <nav class="nav-abas" aria-label="Navegação principal">
    <a class="nav-aba" href="./hoje.html">Hoje</a>
    <a class="nav-aba" href="./historico.html">Histórico</a>
    <a class="nav-aba ativa" href="./coach.html" aria-current="page">Coach</a>
  </nav>

  <main class="conteudo">
    <div id="coach-insights">
      <p class="vazio">Analisando seu histórico...</p>
    </div>

    <div class="form-coach">
      <form id="form-pergunta">
        <label class="form-label" for="campo-pergunta">Pergunte ao coach</label>
        <div class="form-coach-row">
          <input class="input" type="text" id="campo-pergunta"
                 placeholder="ex: devo aumentar a carga do agachamento?"
                 autocomplete="off">
          <button type="submit" class="btn-cta" id="btn-perguntar">Enviar</button>
        </div>
      </form>
    </div>

    <div id="resposta-coach"></div>
  </main>

  <script type="module" src="../js/coach.js"></script>
</body>
</html>
